---
name: Generate Role Docs
'on':
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - galaxy.yml
      - roles/build/.aar_doc.yml
      - roles/build/README.md
      - roles/build/meta/argument_specs.yml
      - roles/build/meta/main.yml
      - roles/install/.aar_doc.yml
      - roles/install/README.md
      - roles/install/meta/argument_specs.yml
      - roles/install/meta/main.yml
defaults:
  run:
    working-directory: 'trippsc2.packer'
jobs:
  docs_build:
    name: Generate build role documentation
    permissions:
      contents: write
    uses: trippsoft/github-actions/.github/workflows/role-docs.yml@main
    with:
      working_directory: 'trippsc2.packer'
      role_name: 'build'
  docs_install:
    name: Generate install role documentation
    permissions:
      contents: write
    needs: docs_build
    uses: trippsoft/github-actions/.github/workflows/role-docs.yml@main
    with:
      working_directory: 'trippsc2.packer'
      role_name: 'install'
